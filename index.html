  {date:"Apr 20",country:"Thailand",city:"Phuket",name:"Promthep Cape",type:"Viewpoint",notes:"Sunset viewpoint",lat:7.7586,lng:98.3050}

const colors = {
  "Germany":"#e74c3c",
  "Czech Republic":"#9b59b6",
  "Hong Kong":"#e67e22",
  "Vietnam":"#27ae60",
  "Thailand":"#3498db"
};

const typeIcons = {
  "Landmark":"⭐","Temple":"🛕","Nightlife":"🎉","Beach":"🏖️","Viewpoint":"👁️",
  "Nature":"🌿","Market":"🛒","Museum":"🏛️","Museum Complex":"🏛️","Park":"🌳",
  "Architecture":"🏗️","Transport":"⛴️","Neighborhood":"🏘️","Town":"📍",
  "Island":"🏝️","Historic Area":"🏯","Adventure":"🪂","Yoga":"🧘"
};

const map = L.map('map').setView([25,80],3);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19
}).addTo(map);

// Draw route lines by country
const grouped = {};
places.forEach(p=>{
  if(!grouped[p.country]) grouped[p.country]=[];
  grouped[p.country].push([p.lat,p.lng]);
});
Object.entries(grouped).forEach(([country,coords])=>{
  L.polyline(coords,{color:colors[country],weight:2.5,opacity:0.5,dashArray:'8 6'}).addTo(map);
});

// Add markers
const markers = L.featureGroup();
places.forEach(p=>{
  const icon = typeIcons[p.type]||"📌";
  const c = colors[p.country];
  const marker = L.circleMarker([p.lat,p.lng],{
    radius:7,fillColor:c,color:'#fff',weight:2,fillOpacity:0.9
  }).addTo(markers);
  marker.bindPopup(`<div style="min-width:180px">
    <strong>${icon} ${p.name}</strong><br>
    <span style="color:${c};font-weight:600">${p.date}</span> · ${p.city}, ${p.country}<br>
    <em>${p.type}</em><br>
    <span style="color:#555">${p.notes}</span>
  </div>`);
  marker.bindTooltip(p.name,{direction:'top',offset:[0,-8]});
});
markers.addTo(map);
map.fitBounds(markers.getBounds().pad(0.1));

// Legend
const legend = L.control({position:'bottomright'});
legend.onAdd = function(){
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = '<h4>🗺️ Nav\'s Trip</h4>' +
    Object.entries(colors).map(([k,v])=>`<i style="background:${v}"></i>${k}`).join('<br>') +
    '<br><small style="color:#888">Mar 12 – Apr 20, 2026</small>';
  return div;
};
legend.addTo(map);
</script>

</html>
